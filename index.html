<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Planeta Shake - Classic Visual & Audio</title>
    <style>
        * { touch-action: none; box-sizing: border-box; -webkit-tap-highlight-color: transparent; backface-visibility: hidden; }
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; background: #020205; overflow: hidden; display: flex; flex-direction: column; }
        #game-container { position: relative; width: 100vw; height: 100vh; background: radial-gradient(circle at center, #2e1a99 0%, #05051a 100%); overflow: hidden; transform: translateZ(0); }
        #main-logo { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); width: 100px; z-index: 15; opacity: 0.8; pointer-events: none; }
        #ui-right-cluster { position: absolute; top: 15px; right: 15px; display: flex; flex-direction: column; align-items: flex-end; z-index: 30; text-shadow: 2px 2px #000; }
        .orange-ui { color: #fc845d; font-weight: 900; font-size: 1.1rem; margin-bottom: 3px; }
        #lives-container { display: flex; gap: 4px; }
        .life-icon { width: 20px; height: 20px; background-image: url('vida.png'); background-size: contain; background-repeat: no-repeat; }
        #ship { position: absolute; background-image: url('nave.png'); background-size: contain; background-repeat: no-repeat; z-index: 10; left: 50%; bottom: 120px; transform: translateX(-50%) rotate(-30deg) translateZ(0); filter: drop-shadow(0 0 10px #00f2ff); will-change: left, width, height, filter; transition: width 0.3s, height 0.3s, filter 0.15s; }
        
        /* Brilhos da Nave */
        #ship.glow-milkshake { filter: drop-shadow(0 0 25px #fc845d) brightness(1.4); }
        #ship.glow-life { filter: drop-shadow(0 0 25px #00ff00) brightness(1.4); }
        #ship.glow-damage { filter: drop-shadow(0 0 25px #ff0000) brightness(1.4); }

        .obj { position: absolute; background-size: contain; background-repeat: no-repeat; z-index: 5; transform: translateZ(0); }
        .obj-milkshake { animation: pulse-orange 0.8s infinite alternate; }
        .obj-life { animation: pulse-green 0.8s infinite alternate; }

        @keyframes pulse-orange { from { filter: drop-shadow(0 0 5px #fc845d); } to { filter: drop-shadow(0 0 15px #fc845d) brightness(1.2); } }
        @keyframes pulse-green { from { filter: drop-shadow(0 0 5px #00ff00); } to { filter: drop-shadow(0 0 18px #00ff00) brightness(1.2); } }

        #msg { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(5, 5, 26, 0.98); padding: 40px; border-radius: 25px; color: #f8f9f9; text-align: center; display: none; z-index: 50; width: 90%; max-width: 400px; border: 3px solid #4f2bd0; }
        .restart-btn { padding: 18px 36px; background: #fc845d; border: none; font-weight: bold; border-radius: 50px; font-size: 1.3rem; color: #fff; cursor: pointer; margin-top: 25px; width: 100%; }
        .star { position: absolute; background: #fff; border-radius: 50%; opacity: 0.3; pointer-events: none; }
    </style>
</head>
<body>
    <div id="game-container">
        <img src="logo.png" id="main-logo">
        <div id="ui-right-cluster">
            <div class="orange-ui">SHAKES: <span id="score">0</span></div>
            <div id="lives-container"></div>
        </div>
        <div id="ship"></div>
        <div id="msg">
            <h1 style="color: #fc845d; margin: 0;">COLISÃO FATAL!</h1>
            <p id="final-stats"></p>
            <button class="restart-btn" onclick="resetGame()">REINICIAR</button>
        </div>
    </div>

<script>
    let audioCtx, active = true, spawnTimeout;
    const ship = document.getElementById('ship'), container = document.getElementById('game-container');
    const scoreDisp = document.getElementById('score'), livesContainer = document.getElementById('lives-container'), msg = document.getElementById('msg');
    let score = 0, lives = 2, speed = 6;
    const sizes = { 'planeta.png': 39, 'venus.png': 59, 'meteoro.png': 63, 'foguete.png': 63, 'milkshake': { w: 45, h: 58 }, 'vida': 36 };

    function initAudio() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
    }

    function playSound(f, type, dur, vol) {
        if(!audioCtx) return;
        const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
        osc.type = type; osc.frequency.setValueAtTime(f, audioCtx.currentTime);
        gain.gain.setValueAtTime(vol, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + dur);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + dur);
    }

    const sfx = {
        collect: () => playSound(880, 'sine', 0.2, 0.1),
        life: () => { playSound(523, 'sine', 0.1, 0.1); setTimeout(() => playSound(880, 'sine', 0.2, 0.1), 100); },
        damage: () => playSound(150, 'sawtooth', 0.3, 0.2),
        over: () => playSound(100, 'square', 0.5, 0.2)
    };

    function updateShipSize() {
        const baseW = 47, baseH = 37, mult = 1 + (Math.max(0, lives - 1) * 0.1);
        ship.style.width = (baseW * mult) + 'px'; ship.style.height = (baseH * mult) + 'px';
        livesContainer.innerHTML = '';
        for (let i = 0; i < lives; i++) {
            const icon = document.createElement('div'); icon.className = 'life-icon';
            livesContainer.appendChild(icon);
        }
    }

    function handleInput(e) {
        initAudio();
        if(!active) return;
        const clientX = (e.type.includes('touch') ? e.touches[0].clientX : e.clientX);
        let targetX = clientX - container.getBoundingClientRect().left;
        let hw = ship.offsetWidth / 2;
        targetX = Math.max(hw, Math.min(container.offsetWidth - hw, targetX));
        ship.style.left = targetX + 'px';
    }

    container.addEventListener('mousemove', handleInput);
    container.addEventListener('touchstart', handleInput);
    container.addEventListener('touchmove', (e) => { e.preventDefault(); handleInput(e); }, {passive: false});

    function spawn() {
        if(!active) return;
        const obj = document.createElement('div');
        const rand = Math.random();
        obj.className = 'obj';
        let type;
        if(rand < 0.30) { 
            type = 'milkshake'; obj.style.backgroundImage = "url('milkshake.png')";
            obj.style.width = sizes.milkshake.w + 'px'; obj.style.height = sizes.milkshake.h + 'px';
            obj.classList.add('obj-milkshake');
        } else if (rand < 0.40) { 
            type = 'life'; obj.style.backgroundImage = "url('vida.png')"; 
            obj.style.width = obj.style.height = sizes.vida + 'px'; obj.classList.add('obj-life');
        } else { 
            type = 'bad'; const obs = ['planeta.png', 'venus.png', 'meteoro.png', 'foguete.png'];
            const img = obs[Math.floor(Math.random()*obs.length)];
            obj.style.backgroundImage = `url('${img}')`; obj.style.width = obj.style.height = sizes[img] + 'px';
        }
        obj.dataset.type = type; obj.style.left = Math.random() * (container.offsetWidth - 60) + 'px';
        obj.style.top = '-80px'; container.appendChild(obj);

        let tp = -80;
        function move() {
            if(!active) { obj.remove(); return; }
            tp += speed; obj.style.top = tp + 'px';
            const s = ship.getBoundingClientRect(), o = obj.getBoundingClientRect();
            if (s.left < o.right-2 && s.right > o.left+2 && s.top < o.bottom-2 && s.bottom > o.top+2) {
                if(type === 'bad') {
                    lives--; sfx.damage(); ship.classList.add('glow-damage');
                    setTimeout(() => ship.classList.remove('glow-damage'), 150);
                    if(lives <= 0) gameOver(); else updateShipSize();
                } else if (type === 'milkshake') {
                    score++; sfx.collect(); scoreDisp.innerText = score;
                    ship.classList.add('glow-milkshake'); setTimeout(() => ship.classList.remove('glow-milkshake'), 150);
                } else if (type === 'life') {
                    if(lives < 3) { lives++; sfx.life(); updateShipSize(); ship.classList.add('glow-life'); setTimeout(() => ship.classList.remove('glow-life'), 150); }
                }
                obj.remove(); return;
            }
            if(tp > window.innerHeight) obj.remove(); else requestAnimationFrame(move);
        }
        requestAnimationFrame(move);
        spawnTimeout = setTimeout(spawn, Math.random() * 400 + 500);
    }

    function gameOver() { active = false; sfx.over(); clearTimeout(spawnTimeout); msg.style.display = 'block'; document.getElementById('final-stats').innerText = `Você coletou ${score} shakes!`; ship.style.opacity = '0.2'; }
    function resetGame() { active = true; score = 0; lives = 2; speed = 6; scoreDisp.innerText = "0"; msg.style.display = 'none'; ship.style.opacity = '1'; updateShipSize(); spawn(); }
    setInterval(() => { if(active && speed < 15) speed += 0.3; }, 4000);
    updateShipSize(); spawn();
    for(let i=0; i<25; i++) {
        let star = document.createElement('div'); star.className = 'star';
        star.style.width = star.style.height = Math.random()*2+'px';
        star.style.left = Math.random()*100+'%'; star.style.top = Math.random()*100+'%';
        container.appendChild(star);
    }
</script>
</body>
</html>
